<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 348 100" width="348" height="100" role="img" aria-label="Splasher">
  <rect width="348" height="100" rx="2" fill="#0e1117"/>

  <!-- the app's signature: concentric rings propagating outward (the "ripple") -->
  <g transform="translate(52,50)" fill="none" stroke="#3b82f6">
    <circle r="10" stroke-width="2.4" opacity="0.95"/>
    <circle r="21" stroke-width="2.2" opacity="0.5"/>
    <circle r="32" stroke-width="2"   opacity="0.25"/>
    <circle r="3.2" fill="#5b9bff" stroke="none"/>
  </g>

  <text x="106" y="63" font-family="ui-sans-serif, system-ui, 'Segoe UI', Roboto, sans-serif"
        font-size="38" font-weight="700" letter-spacing="4" fill="#e7eaf0">SPLASHER</text>
</svg>
