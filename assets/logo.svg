<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 220" width="820" height="220" role="img" aria-label="Splasher">
  <defs>
    <linearGradient id="splash" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#22d3ee"/>
      <stop offset="1" stop-color="#2563eb"/>
    </linearGradient>
  </defs>

  <!-- brutalist offset shadow + panel -->
  <rect x="18" y="22" width="784" height="176" fill="#1d4ed8"/>
  <rect x="10" y="14" width="784" height="176" fill="#0a0b0f" stroke="#2563eb" stroke-width="4"/>

  <!-- BEV grid mark with a "splash" of labeled cells -->
  <g transform="translate(44,44)">
    <rect width="120" height="120" fill="#0e1117"/>
    <!-- filled cells (the splash) -->
    <g fill="url(#splash)">
      <rect x="32" y="2"  width="26" height="26"/>
      <rect x="2"  y="32" width="26" height="26"/>
      <rect x="32" y="32" width="26" height="26"/>
      <rect x="62" y="32" width="26" height="26"/>
      <rect x="32" y="62" width="26" height="26"/>
      <rect x="62" y="62" width="26" height="26"/>
      <rect x="92" y="92" width="26" height="26"/>
    </g>
    <!-- grid lines -->
    <g stroke="#1f2a44" stroke-width="2">
      <line x1="0" y1="30" x2="120" y2="30"/>
      <line x1="0" y1="60" x2="120" y2="60"/>
      <line x1="0" y1="90" x2="120" y2="90"/>
      <line x1="30" y1="0" x2="30" y2="120"/>
      <line x1="60" y1="0" x2="60" y2="120"/>
      <line x1="90" y1="0" x2="90" y2="120"/>
    </g>
    <rect width="120" height="120" fill="none" stroke="#2563eb" stroke-width="3"/>
  </g>

  <!-- wordmark -->
  <text x="200" y="116" font-family="'Courier New', ui-monospace, monospace" font-size="66" font-weight="800" letter-spacing="1" fill="#ffffff">splasher</text>
  <rect x="202" y="132" width="300" height="6" fill="#2563eb"/>
  <text x="202" y="166" font-family="ui-monospace, 'Courier New', monospace" font-size="17" letter-spacing="1" fill="#60a5fa">synchronized channels &#8594; BEV grid / per-point labels</text>
</svg>
